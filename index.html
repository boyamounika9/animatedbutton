<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background-color:black;
}

button{
height:100px;
width:500px;
background-color:rgb(41,41,41);
color:darkgrey;
font-size:40px;
border:none;
border-radius:1000px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* Gradient Border */
button::after{
content:"";
position:absolute;

height:110%;
width:104%;

background:linear-gradient(
90deg,
rgb(163, 208, 101),
yellow,
lime,
rgb(163, 208, 101)
);
border-radius:1000px;
background-size:300%;
z-index:-1;
filter: blur(5px);
animation:borderMove 4s linear infinite;

}
button:hover{
    z-index: 1;
    color: black;
    box-shadow:20px 0 100px rgba(255, 255, 0, 0.434), -20px 0 100px rgba(0, 255, 0, 0.297);
;
}
@keyframes borderMove{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}


</style>
</head>
<body>
    <button>hover me</button>
</body>
</html>
